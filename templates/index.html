<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VisualSense AI</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👁️</text></svg>">
    
    <style>
        /* Μικρή αναβάθμιση και στα χρώματα του UI για να ταιριάζει με το νέο όνομα */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        .header-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .lang-toggle { width: auto; padding: 10px 14px; background-color: #1f6f8b; font-size: 14px; border-radius: 999px; }
        .lang-toggle:hover { background-color: #18586f; }
        
        /* Ο κεντρικός τίτλος μέσα στη σελίδα */
        h1 { text-align: center; color: #2c3e50; font-size: 28px; margin-bottom: 10px; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 15px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #34495e;}
        input[type="file"], input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #3498db; outline: none; }
        .divider { text-align: center; margin: 20px 0; font-weight: bold; color: #bdc3c7; font-size: 14px; text-transform: uppercase; }
        
        #preview-container { display: none; text-align: center; margin-bottom: 25px; }
        #preview-img { max-width: 100%; max-height: 280px; border-radius: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.1); object-fit: contain; }
        
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        button:hover { background-color: #2980b9; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #result-container { margin-top: 30px; display: none; }
        
        .lang-box { background: #f8f9fa; border-left: 5px solid #3498db; padding: 18px; margin-bottom: 15px; border-radius: 0 8px 8px 0; line-height: 1.7; font-size: 15px; color: #2c3e50;}
        .lang-box.el { border-left-color: #2ecc71; } 
        .lang-box h3 { margin-top: 0; margin-bottom: 12px; font-size: 17px; display: flex; align-items: center; gap: 8px; color: #2c3e50; }
        
        .notice-msg { background-color: #f3f8ff; border-left: 5px solid #4f8cff; padding: 15px; color: #23527c; border-radius: 6px; display: none; margin-top: 20px; font-weight: 500; }
        .error-msg { background-color: #fdf0ed; border-left: 5px solid #e74c3c; padding: 15px; color: #c0392b; border-radius: 6px; display: none; margin-top: 20px; font-weight: 500;}
        .spinner { display: none; text-align: center; margin-top: 25px; font-weight: 600; color: #3498db; font-size: 15px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <button type="button" id="langToggle" class="lang-toggle">English</button>
        </div>
        <h1>VisualSense AI</h1>
        <div class="subtitle">Έξυπνη Περιγραφή Εικόνων</div>
        
        <div id="preview-container">
            <img id="preview-img" src="" alt="Προεπισκόπηση Εικόνας">
        </div>

        <form id="analyzeForm">
            <div class="form-group">
                <label for="image_file">Επέλεξε εικόνα από τον υπολογιστή:</label>
                <input type="file" id="image_file" name="image_file" accept="image/*">
            </div>
            
            <div class="divider">Ή</div>
            
            <div class="form-group">
                <label for="image_url">Επικόλληση URL Εικόνας:</label>
                <input type="text" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
            </div>
            
            <button type="submit" id="submitBtn">Ανάλυση Εικόνας</button>
        </form>

        <div class="spinner" id="spinner">
            Το AI αναλύει και μεταφράζει... Περίμενε λίγο!
        </div>

    <div class="notice-msg" id="notice-container"></div>
    <div class="error-msg" id="error-container"></div>

        <div id="result-container">
            <div class="lang-box el" id="result-box-el">
                <h3>🇬🇷 Ελληνικά</h3>
                <div id="result-text-el"></div>
            </div>
            
            <div class="lang-box" id="result-box-en">
                <h3>🇬🇧 English</h3>
                <div id="result-text-en"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('image_file');
        const urlInput = document.getElementById('image_url');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const langToggle = document.getElementById('langToggle');
        const root = document.documentElement;
        const resultContainer = document.getElementById('result-container');
        const resultBoxEl = document.getElementById('result-box-el');
        const resultBoxEn = document.getElementById('result-box-en');
        const resultTextEl = document.getElementById('result-text-el');
        const resultTextEn = document.getElementById('result-text-en');
        const noticeContainer = document.getElementById('notice-container');

        let currentResult = {
            description_en: '',
            description_el: ''
        };

        const translations = {
            el: {
                htmlLang: 'el',
                toggleLabel: 'English',
                title: 'VisualSense AI',
                subtitle: 'Έξυπνη Περιγραφή Εικόνων',
                fileLabel: 'Επέλεξε εικόνα από τον υπολογιστή:',
                divider: 'Ή',
                urlLabel: 'Επικόλληση URL Εικόνας:',
                urlPlaceholder: 'https://example.com/image.jpg',
                submit: 'Ανάλυση Εικόνας',
                spinner: 'Το AI αναλύει και μεταφράζει... Περίμενε λίγο!',
                resultElTitle: '🇬🇷 Ελληνικά',
                resultEnTitle: '🇬🇧 English',
                emptyTranslation: 'Το μοντέλο δεν επέστρεψε Ελληνική μετάφραση.',
                uploadAlert: 'Παρακαλώ επέλεξε ένα αρχείο ή βάλε ένα URL!',
                modelUnavailableNotice: 'Το επιλεγμένο LLM μοντέλο δεν είναι διαθέσιμο ή έχει αποσυρθεί. Δοκίμασε αργότερα ή άλλαξε μοντέλο στη ρύθμιση του server.'
            },
            en: {
                htmlLang: 'en',
                toggleLabel: 'Ελληνικά',
                title: 'VisualSense AI',
                subtitle: 'Smart Image Descriptions',
                fileLabel: 'Choose an image from your computer:',
                divider: 'OR',
                urlLabel: 'Paste Image URL:',
                urlPlaceholder: 'https://example.com/image.jpg',
                submit: 'Analyze Image',
                spinner: 'The AI is analyzing and translating... Please wait!',
                resultElTitle: '🇬🇷 Greek',
                resultEnTitle: '🇬🇧 English',
                emptyTranslation: 'The model did not return a Greek translation.',
                uploadAlert: 'Please choose a file or paste a URL!',
                modelUnavailableNotice: 'The selected LLM model is unavailable or has been deprecated. Try again later or change the model in the server settings.'
            }
        };

        let currentLanguage = 'el';

        function renderVisibleDescription() {
            const strings = translations[currentLanguage];
            const showGreek = currentLanguage === 'el';

            resultBoxEl.style.display = showGreek ? 'block' : 'none';
            resultBoxEn.style.display = showGreek ? 'none' : 'block';

            resultTextEl.innerText = currentResult.description_el || strings.emptyTranslation;
            resultTextEn.innerText = currentResult.description_en || (currentLanguage === 'en' ? 'No English description yet.' : '');
        }

        function showNotice(message) {
            noticeContainer.innerText = message;
            noticeContainer.style.display = 'block';
        }

        function applyLanguage(language) {
            currentLanguage = language;
            const strings = translations[language];

            root.lang = strings.htmlLang;
            langToggle.textContent = strings.toggleLabel;
            document.title = strings.title;
            document.querySelector('h1').textContent = strings.title;
            document.querySelector('.subtitle').textContent = strings.subtitle;
            document.querySelector('label[for="image_file"]').textContent = strings.fileLabel;
            document.querySelector('.divider').textContent = strings.divider;
            document.querySelector('label[for="image_url"]').textContent = strings.urlLabel;
            urlInput.placeholder = strings.urlPlaceholder;
            document.getElementById('submitBtn').textContent = strings.submit;
            document.getElementById('spinner').textContent = strings.spinner;
            document.querySelector('#result-container .lang-box.el h3').textContent = strings.resultElTitle;
            document.querySelector('#result-container .lang-box:not(.el) h3').textContent = strings.resultEnTitle;

            renderVisibleDescription();
        }

        langToggle.addEventListener('click', function() {
            applyLanguage(currentLanguage === 'el' ? 'en' : 'el');
        });

        // Προεπισκόπηση όταν διαλέγεις αρχείο (Τοπικά, χωρίς να ανέβει ακόμα)
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(this.files[0]);
                urlInput.value = ''; // Καθαρίζει το URL
            }
        });

        // Προεπισκόπηση όταν βάζεις URL
        urlInput.addEventListener('input', function() {
            if (this.value) {
                previewImg.src = this.value;
                previewContainer.style.display = 'block';
                fileInput.value = ''; // Καθαρίζει το Αρχείο
            } else {
                previewContainer.style.display = 'none';
            }
        });

        document.getElementById('analyzeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!fileInput.files[0] && !urlInput.value.trim()) {
                alert(translations[currentLanguage].uploadAlert);
                return;
            }

            const formData = new FormData();
            if (fileInput.files[0]) formData.append('image_file', fileInput.files[0]);
            else formData.append('image_url', urlInput.value.trim());

            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const errorContainer = document.getElementById('error-container');

            submitBtn.disabled = true;
            spinner.style.display = 'block';
            resultContainer.style.display = 'none';
            noticeContainer.style.display = 'none';
            errorContainer.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.notice_key === 'model_unavailable') {
                    showNotice(translations[currentLanguage].modelUnavailableNotice);
                    currentResult = {
                        description_en: '',
                        description_el: ''
                    };
                    resultContainer.style.display = 'none';
                    return;
                }

                if (!response.ok) {
                    throw new Error(data.error || 'Προέκυψε κάποιο άγνωστο σφάλμα');
                }

                currentResult = {
                    description_en: data.description_en || '',
                    description_el: data.description_el || ''
                };

                renderVisibleDescription();
                
                resultContainer.style.display = 'block';
            } catch (error) {
                errorContainer.innerText = error.message;
                errorContainer.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        applyLanguage('el');
    </script>
</body>
</html>
